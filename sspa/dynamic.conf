# core/sspa/dynamic.conf
# proxy_pass com variáveis + resolver 127.0.0.11 evita [emerg] host not found quando só o sspa sobe
# (resolução adiada ao pedido; upstreams ausentes devolvem 502 em runtime).
# Com variável em proxy_pass o URI não é truncado ao prefixo do location — usar rewrite + break antes do proxy.
server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    if ($request_uri ~* "(\.\../|\.\.\\|\.\.%2f|\.\.%5c|%2e%2e/)") {
        return 403;
    }

    location /mfe/chatbot/ {
        set $u_mfe_profile mfe-chatbot;
        rewrite ^/mfe/chatbot/(.*)$ /$1 break;
        proxy_pass http://$u_mfe_chatbot;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        expires off;
    }

    location /mfe/navigation/ {
        set $u_mfe_navigation mfe-navigation;
        rewrite ^/mfe/navigation/(.*)$ /$1 break;
        proxy_pass http://$u_mfe_navigation;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        expires off;
    }

    location /mfe/design-system/ {
        set $u_mfe_design_system mfe-design-system;
        rewrite ^/mfe/design-system/(.*)$ /$1 break;
        proxy_pass http://$u_mfe_design_system;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        expires off;
    }

    location /mfe/ {
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
