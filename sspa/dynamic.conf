# core/sspa/dynamic.conf
# proxy_pass com variáveis + resolver 127.0.0.11 evita [emerg] host not found quando só o sspa sobe
# (resolução adiada ao pedido; upstreams ausentes devolvem 502 em runtime).
# Com variável em proxy_pass o URI não é truncado ao prefixo do location — usar rewrite + break antes do proxy.
server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    if ($request_uri ~* "(\.\../|\.\.\\|\.\.%2f|\.\.%5c|%2e%2e/)") {
        return 403;
    }

    location /mfe/account/ {
        set $u_mfe_account mfe-account;
        rewrite ^/mfe/account/(.*)$ /$1 break;
        proxy_pass http://$u_mfe_account;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        expires off;
    }

    location /mfe/authtorization/ {
        set $u_mfe_authtorization mfe-authtorization;
        rewrite ^/mfe/authtorization/(.*)$ /$1 break;
        proxy_pass http://$u_mfe_authtorization;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        expires off;
    }

    location /mfe/config/ {
        set $u_mfe_config mfe-config;
        rewrite ^/mfe/config/(.*)$ /$1 break;
        proxy_pass http://$u_mfe_config;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        expires off;
    }

    location /mfe/key/ {
        set $u_mfe_key mfe-key;
        rewrite ^/mfe/key/(.*)$ /$1 break;
        proxy_pass http://$u_mfe_key;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        expires off;
    }

    location /mfe/rating/ {
        set $u_mfe_rating mfe-rating;
        rewrite ^/mfe/rating/(.*)$ /$1 break;
        proxy_pass http://$u_mfe_rating;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        expires off;
    }

    location /mfe/usage/ {
        set $u_mfe_usage mfe-usage;
        rewrite ^/mfe/usage/(.*)$ /$1 break;
        proxy_pass http://$u_mfe_usage;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        expires off;
    }

    location /mfe/profile/ {
        set $u_mfe_profile mfe-profile;
        rewrite ^/mfe/profile/(.*)$ /$1 break;
        proxy_pass http://$u_mfe_profile;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        expires off;
    }

    location /mfe/navigation/ {
        set $u_mfe_navigation mfe-navigation;
        rewrite ^/mfe/navigation/(.*)$ /$1 break;
        proxy_pass http://$u_mfe_navigation;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        expires off;
    }

    location /mfe/design-system/ {
        set $u_mfe_design_system mfe-design-system;
        rewrite ^/mfe/design-system/(.*)$ /$1 break;
        proxy_pass http://$u_mfe_design_system;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        expires off;
    }

    location /mfe/api/ {
        set $u_mfe_api mfe-api;
        rewrite ^/mfe/api/(.*)$ /$1 break;
        proxy_pass http://$u_mfe_api;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        expires off;
    }

    location = /runtime-config {
        set $upstream_api_config http://api-config:3010;
        proxy_pass $upstream_api_config/runtime-config;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        expires off;
    }

    location = /api/v1/runtime-config {
        set $upstream_api_config_v1 http://api-config:3010;
        proxy_pass $upstream_api_config_v1/api/v1/runtime-config;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        expires off;
    }

    location /api/login/ {
        set $upstream_api_login http://api-login:3011;
        proxy_pass $upstream_api_login/;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        expires off;
    }

    location /mfe/ {
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
