<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot - Chatbot</title>
    <style>
      body { margin: 0; padding: 16px; display: flex; justify-content: center; background: #f0fdf4; font-family: sans-serif; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // single-spa standalone bootstrap
      window.__SINGLE_SPA_DEVTOOLS__ = { disabled: true };
    </script>
    <script type="module">
      import { bootstrap, mount } from '/spa.js';
      const props = {
        name: '@mfe/mfe-chatbot',
        singleSpa: { MOUNTING: 3, MOUNTED: 4 },
        domElement: document.getElementById('root'),
        mountParcel: function() {}
      };
      try {
        await bootstrap(props);
        await mount(props);
      } catch(e) {
        document.getElementById('root').innerHTML = '<p>Erro ao carregar: ' + e.message + '</p>';
      }
    </script>
  </body>
</html>
