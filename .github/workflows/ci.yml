name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: npm install
      - name: Validate distribution milestone plan coverage (M0–M2)
        run: npm run test:docs-milestones
      - name: Lint workspace
        run: npm run lint
      - name: Test workspace
        run: npm test -w eslint-plugin-hardcode-detect
