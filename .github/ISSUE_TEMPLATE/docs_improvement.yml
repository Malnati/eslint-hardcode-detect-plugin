name: Documentation improvement
description: Suggest an improvement in README, docs, or specs discoverability.
title: "docs: "
labels:
  - documentation
body:
  - type: textarea
    id: location
    attributes:
      label: Documentation location
      description: Which file or section needs improvement?
      placeholder: README.md, packages/eslint-plugin-hardcode-detect/README.md, docs/...
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: Current issue
      description: What is confusing, missing, or incorrect?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Suggested improvement
      description: Proposed text, structure, or examples.
    validations:
      required: true
