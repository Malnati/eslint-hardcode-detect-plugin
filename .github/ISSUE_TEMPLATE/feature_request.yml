name: Feature request
description: Propose a new capability for eslint-plugin-hardcode-detect.
title: "feat: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement.
        Explain the problem first, then the proposed approach.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What limitation or pain point are you facing?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want and why it helps.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other options you evaluated.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Rule behavior
        - Remediation mode R1
        - Remediation mode R2
        - Remediation mode R3
        - DX and docs
        - CI and tooling
    validations:
      required: true
